server:
  port: 8080                      # Agent(FastAPI) 在 8000,业务系统在 8080;前端 vite 代理 /api/tickets → 这里

spring:
  application:
    name: moto-business-system
  datasource:
    url: jdbc:postgresql://localhost:5433/moto   # 用 5433:主机已有本地 PostgreSQL 占了 5432,Docker 容器映射到 5433 避冲突
    username: ${POSTGRES_USER:moto}       # 本地开发默认 moto;生产用环境变量覆盖
    password: ${POSTGRES_PASSWORD:moto}
  jpa:
    hibernate:
      ddl-auto: update            # 开发期:按实体自动建/改表(refund_tickets / users)。生产应换 Flyway/Liquibase 迁移
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# JWT 鉴权。secret 必须 ≥ 32 字节(HS256);FastAPI 用同一把 secret 验令牌(共享密钥,非共享 session)。
# 生产用环境变量覆盖,别用这个默认值。
jwt:
  secret: ${JWT_SECRET:moto-dev-jwt-secret-change-me-please-0123456789abcdef}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 小时
